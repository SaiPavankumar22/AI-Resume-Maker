<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ResumeForge — AI Resume Builder</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0d0f0e;
    --bg2: #141714;
    --bg3: #1c201c;
    --bg4: #242824;
    --border: #2e342e;
    --border2: #3a403a;
    --accent: #a8e063;
    --accent2: #7bc940;
    --accent-dim: rgba(168,224,99,0.12);
    --text: #e8ede8;
    --text2: #9aa89a;
    --text3: #6a766a;
    --red: #e06363;
    --amber: #e0b863;
    --radius: 6px;
    --radius2: 10px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(168,224,99,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(168,224,99,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ---- HEADER ---- */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(13,15,14,0.85);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }

  .logo-icon {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 6px;
    display: grid;
    place-items: center;
    font-size: 16px;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    color: #0d0f0e;
    line-height: 1;
  }

  .logo-text {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .logo-text span { color: var(--accent); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-dim);
    border: 1px solid rgba(168,224,99,0.25);
    padding: 3px 8px;
    border-radius: 20px;
  }

  /* ---- HERO ---- */
  .hero {
    position: relative;
    z-index: 1;
    padding: 72px 32px 48px;
    text-align: center;
  }

  .hero-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .hero-label::before, .hero-label::after {
    content: '';
    width: 32px;
    height: 1px;
    background: var(--accent);
    opacity: 0.4;
  }

  .hero h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(36px, 5vw, 64px);
    line-height: 1.1;
    letter-spacing: -1px;
    color: var(--text);
    margin-bottom: 16px;
  }

  .hero h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .hero p {
    font-size: 16px;
    color: var(--text2);
    max-width: 480px;
    margin: 0 auto;
    line-height: 1.6;
  }

  /* ---- MAIN CONTENT ---- */
  .main {
    position: relative;
    z-index: 1;
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 32px 80px;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .section-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    color: var(--text2);
    letter-spacing: 0.5px;
  }

  .section-title .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }

  /* ---- TEMPLATE GRID ---- */
  .templates-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px;
    margin-bottom: 60px;
  }

  .template-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius2);
    overflow: hidden;
    transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
    position: relative;
  }

  .template-card:hover {
    border-color: var(--accent);
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(168,224,99,0.1);
  }

  .template-card:hover .card-select-btn {
    opacity: 1;
    transform: translateY(0);
  }

  .card-preview {
    position: relative;
    aspect-ratio: 3/4;
    background: var(--bg3);
    overflow: hidden;
  }

  .card-preview img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.3s;
  }

  .template-card:hover .card-preview img {
    transform: scale(1.03);
  }

  .card-preview-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text3);
  }

  .placeholder-doc {
    width: 72px;
    height: 90px;
    background: var(--bg4);
    border: 1px solid var(--border2);
    border-radius: 4px;
    position: relative;
    display: flex;
    flex-direction: column;
    padding: 10px;
    gap: 5px;
  }

  .placeholder-doc::after {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 14px; height: 14px;
    background: var(--bg);
    clip-path: polygon(0 0, 100% 100%, 100% 0);
  }

  .placeholder-line {
    height: 4px;
    background: var(--border2);
    border-radius: 2px;
  }

  .placeholder-line.w-full { width: 100%; }
  .placeholder-line.w-3\/4 { width: 75%; }
  .placeholder-line.w-1\/2 { width: 50%; }
  .placeholder-line.accent { background: rgba(168,224,99,0.3); width: 100%; }

  .card-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(13,15,14,0.9) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .template-card:hover .card-overlay { opacity: 1; }

  .card-select-btn {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: var(--accent);
    color: #0d0f0e;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 13px;
    border: none;
    border-radius: 6px;
    padding: 8px 20px;
    cursor: pointer;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
  }

  .card-info {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid var(--border);
  }

  .card-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }

  .card-meta {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.5px;
  }

  /* ---- SKELETON ---- */
  .skeleton {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius2);
    overflow: hidden;
    animation: pulse 1.8s ease-in-out infinite;
  }

  .skeleton-preview {
    aspect-ratio: 3/4;
    background: linear-gradient(90deg, var(--bg3) 25%, var(--bg4) 50%, var(--bg3) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s ease-in-out infinite;
  }

  .skeleton-info {
    padding: 14px 16px;
    background: var(--bg2);
  }

  .skeleton-line {
    height: 10px;
    background: var(--bg3);
    border-radius: 4px;
    margin-bottom: 6px;
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* ---- UPLOAD PANEL ---- */
  .upload-section {
    margin-top: 48px;
  }

  .upload-toggle {
    background: none;
    border: 1px solid var(--border2);
    color: var(--text2);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 8px 16px;
    border-radius: var(--radius);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: border-color 0.2s, color 0.2s;
  }

  .upload-toggle:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .upload-toggle .icon { font-size: 14px; }

  .upload-panel {
    display: none;
    margin-top: 20px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius2);
    padding: 28px;
  }

  .upload-panel.open { display: block; animation: slideDown 0.2s ease; }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .upload-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  @media (max-width: 640px) { .upload-grid { grid-template-columns: 1fr; } }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .form-group.full { grid-column: 1 / -1; }

  label {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text3);
  }

  input[type="text"],
  input[type="file"],
  textarea {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 10px 14px;
    border-radius: var(--radius);
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }

  input:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(168,224,99,0.1);
  }

  textarea {
    resize: vertical;
    min-height: 120px;
    line-height: 1.5;
  }

  input[type="file"] {
    padding: 8px 12px;
    cursor: pointer;
    color: var(--text2);
  }

  input[type="file"]::file-selector-button {
    background: var(--bg4);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    margin-right: 10px;
  }

  .upload-actions {
    margin-top: 20px;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .btn-primary {
    background: var(--accent);
    color: #0d0f0e;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 14px;
    border: none;
    padding: 10px 22px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }

  .btn-primary:hover { background: var(--accent2); }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-ghost {
    background: none;
    color: var(--text2);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    border: 1px solid var(--border);
    padding: 10px 18px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }

  .btn-ghost:hover { border-color: var(--border2); color: var(--text); }

  /* ---- TOAST ---- */
  .toast-container {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 999;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .toast {
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text);
    font-size: 13px;
    padding: 12px 18px;
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    gap: 10px;
    animation: toastIn 0.25s ease;
    max-width: 320px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .toast.success { border-left: 3px solid var(--accent); }
  .toast.error { border-left: 3px solid var(--red); }

  @keyframes toastIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ---- EMPTY STATE ---- */
  .empty-state {
    grid-column: 1 / -1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 24px;
    gap: 12px;
    color: var(--text3);
  }

  .empty-state .icon { font-size: 40px; opacity: 0.4; }
  .empty-state p { font-size: 14px; }

  /* ---- SCROLLBAR ---- */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text3); }
</style>
</head>
<body>

<header>
  <a class="logo" href="#">
    <div class="logo-icon">R</div>
    <span class="logo-text">Resume<span>Forge</span></span>
  </a>
  <div class="header-right">
    <span class="badge">AI-Powered</span>
  </div>
</header>

<div class="hero">
  <div class="hero-label">Select a template to begin</div>
  <h1>Craft your <em>perfect</em> resume<br/>with AI assistance</h1>
  <p>Choose from professionally designed LaTeX templates, then let AI help you write and refine every word.</p>
</div>

<div class="main">
  <div class="section-header">
    <div class="section-title">
      <div class="dot"></div>
      <span>Available Templates</span>
    </div>
    <button class="upload-toggle" id="uploadToggle">
      <span class="icon">+</span> Upload Template
    </button>
  </div>

  <div class="templates-grid" id="templatesGrid">
    <!-- Skeleton placeholders -->
    <div class="skeleton"><div class="skeleton-preview"></div><div class="skeleton-info"><div class="skeleton-line" style="width:60%"></div></div></div>
    <div class="skeleton"><div class="skeleton-preview"></div><div class="skeleton-info"><div class="skeleton-line" style="width:45%"></div></div></div>
    <div class="skeleton"><div class="skeleton-preview"></div><div class="skeleton-info"><div class="skeleton-line" style="width:70%"></div></div></div>
    <div class="skeleton"><div class="skeleton-preview"></div><div class="skeleton-info"><div class="skeleton-line" style="width:55%"></div></div></div>
  </div>

  <!-- Upload Section -->
  <div class="upload-section">
    <div class="upload-panel" id="uploadPanel">
      <div class="section-header" style="margin-bottom:20px">
        <div class="section-title">
          <div class="dot"></div>
          <span>Upload New Template</span>
        </div>
      </div>
      <div class="upload-grid">
        <div class="form-group">
          <label>Template Name</label>
          <input type="text" id="tplName" placeholder="e.g. Modern Minimal" />
        </div>
        <div class="form-group">
          <label>Preview Image</label>
          <input type="file" id="tplImage" accept="image/*" />
        </div>
        <div class="form-group full">
          <label>LaTeX Code</label>
          <textarea id="tplLatex" placeholder="\documentclass{article}&#10;% Your LaTeX template code here..." style="min-height:160px; font-size:12px;"></textarea>
        </div>
      </div>
      <div class="upload-actions">
        <button class="btn-primary" id="uploadBtn">Upload Template</button>
        <button class="btn-ghost" id="cancelUpload">Cancel</button>
        <span id="uploadStatus" style="font-size:13px;color:var(--text3);margin-left:8px;"></span>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
const BASE = 'http://localhost:8000';

async function fetchTemplates() {
  try {
    const res = await fetch(`${BASE}/templates`);
    if (!res.ok) throw new Error('Failed to fetch templates');
    return await res.json();
  } catch (e) {
    return null;
  }
}

function renderTemplates(templates) {
  const grid = document.getElementById('templatesGrid');
  grid.innerHTML = '';

  if (!templates || templates.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="icon">📄</div>
        <p>No templates available yet. Upload one to get started.</p>
      </div>`;
    return;
  }

  templates.forEach((tpl, i) => {
    const card = document.createElement('div');
    card.className = 'template-card';
    card.style.animationDelay = `${i * 60}ms`;
    card.style.animation = 'slideDown 0.3s ease forwards';

    const imgSrc = tpl.preview_image
      ? (tpl.preview_image.startsWith('http') ? tpl.preview_image : `${BASE}${tpl.preview_image}`)
      : null;

    const previewHTML = imgSrc
      ? `<img src="${imgSrc}" alt="${tpl.name}" onerror="this.parentElement.innerHTML=placeholderHTML()" />`
      : placeholderHTML();

    card.innerHTML = `
      <div class="card-preview">
        ${previewHTML}
        <div class="card-overlay"></div>
        <button class="card-select-btn">Use This Template →</button>
      </div>
      <div class="card-info">
        <span class="card-name">${tpl.name}</span>
        <span class="card-meta">LaTeX</span>
      </div>`;

    card.querySelector('.card-select-btn').addEventListener('click', () => {
      window.location.href = `/ai%20resume-frontend/editor.html?template_id=${tpl.id}`;
    });
    card.addEventListener('click', (e) => {
      if (e.target.classList.contains('card-select-btn')) return;
      window.location.href = `/ai%20resume-frontend/editor.html?template_id=${tpl.id}`;
    });

    grid.appendChild(card);
  });
}

function placeholderHTML() {
  return `
    <div class="card-preview-placeholder">
      <div class="placeholder-doc">
        <div class="placeholder-line accent"></div>
        <div class="placeholder-line w-3/4"></div>
        <div class="placeholder-line w-full"></div>
        <div class="placeholder-line w-full"></div>
        <div class="placeholder-line w-1/2"></div>
        <div class="placeholder-line w-full"></div>
        <div class="placeholder-line w-3/4"></div>
      </div>
    </div>`;
}

function toast(msg, type = 'success') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// Toggle upload panel
document.getElementById('uploadToggle').addEventListener('click', () => {
  const panel = document.getElementById('uploadPanel');
  panel.classList.toggle('open');
  document.getElementById('uploadToggle').textContent = panel.classList.contains('open')
    ? '✕ Close' : '+ Upload Template';
});

document.getElementById('cancelUpload').addEventListener('click', () => {
  document.getElementById('uploadPanel').classList.remove('open');
  document.getElementById('uploadToggle').innerHTML = '<span class="icon">+</span> Upload Template';
});

document.getElementById('uploadBtn').addEventListener('click', async () => {
  const name = document.getElementById('tplName').value.trim();
  const imageFile = document.getElementById('tplImage').files[0];
  const latex = document.getElementById('tplLatex').value.trim();
  const statusEl = document.getElementById('uploadStatus');
  const btn = document.getElementById('uploadBtn');

  if (!name || !latex) {
    toast('Name and LaTeX code are required.', 'error');
    return;
  }

  btn.disabled = true;
  statusEl.textContent = 'Uploading…';

  const fd = new FormData();
  fd.append('name', name);
  fd.append('latex_code', latex);
  if (imageFile) fd.append('preview_image', imageFile);

  try {
    const res = await fetch(`${BASE}/templates/upload`, { method: 'POST', body: fd });
    if (!res.ok) throw new Error('Upload failed');
    toast('Template uploaded successfully!');
    statusEl.textContent = '';
    document.getElementById('tplName').value = '';
    document.getElementById('tplLatex').value = '';
    document.getElementById('tplImage').value = '';
    document.getElementById('uploadPanel').classList.remove('open');
    document.getElementById('uploadToggle').innerHTML = '<span class="icon">+</span> Upload Template';
    const templates = await fetchTemplates();
    renderTemplates(templates);
  } catch (e) {
    toast('Upload failed. Check backend connection.', 'error');
    statusEl.textContent = '';
  } finally {
    btn.disabled = false;
  }
});

// Init
(async () => {
  const templates = await fetchTemplates();
  if (!templates) {
    toast('Could not connect to backend (localhost:8000)', 'error');
    renderTemplates([]);
  } else {
    renderTemplates(templates);
  }
})();
</script>
</body>
</html>
